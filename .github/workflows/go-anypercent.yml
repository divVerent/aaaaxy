name: Any% Multi-Platform Test Run
'on':
  pull_request: null
  push: null
  schedule:
    - cron: 55 22 * * *
  workflow_dispatch: null
jobs:
  build-linux-amd64:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get -y install libasound2-dev libgl-dev
          libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev strip-nondeterminism
          xvfb
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Build
        run: make BUILDTYPE=fsrelease
        env:
          AAAAXY_BUILD_USE_VERSION_FILE: true
          GOTOOLCHAIN: local
      - name: Archive Binary
        uses: actions/upload-artifact@v7
        with:
          name: aaaaxy-debug-linux-amd64
          path: 'aaaaxy

            assets/generated/

            '
  test-linux-amd64:
    permissions:
      contents: read
    needs: build-linux-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get -y install libgl1 xvfb
      - name: Download Binary
        uses: actions/download-artifact@v8
        with:
          name: aaaaxy-debug-linux-amd64
      - name: Make Binary Executable
        run: chmod +x aaaaxy
      - name: Test
        run: 'xvfb-run scripts/github-action-benchmark.sh "Any% linux-amd64" benchmark.txt
          scripts/regression-test-demo.sh linux-amd64 "your time: 0:21:47.250; your
          speedrun categories: Any%;" ./aaaaxy assets/demos/_anypercent.dem'
      - name: Archive Results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: regression-test-results-anypercent-linux-amd64
          path: 'assets/demos/*.dem.*.log

            assets/demos/*.dem.*.png

            '
      - name: Store benchmark result
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule' }}
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Any% linux-amd64
          tool: customSmallerIsBetter
          output-file-path: benchmark.txt
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          auto-push: false
          alert-threshold: 125%
          alert-comment-cc-users: '@divVerent'
          max-items-in-chart: 90
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Diff Benchmark Commit
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule' }}
        run: |
          git show gh-pages > bench.patch
      - name: Upload Benchmark Results
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule' }}
        uses: actions/upload-artifact@v7
        with:
          name: bench-linux-amd64
          path: bench.patch
          if-no-files-found: error
  build-windows-amd64:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get -y install imagemagick libasound2-dev
          libgl-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev
          strip-nondeterminism
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Build
        run: make BUILDTYPE=fsrelease
        env:
          AAAAXY_BUILD_USE_VERSION_FILE: true
          GOARCH: amd64
          GOOS: windows
          GOTOOLCHAIN: local
      - name: Archive Binary
        uses: actions/upload-artifact@v7
        with:
          name: aaaaxy-debug-windows-amd64
          path: 'aaaaxy.exe

            assets/generated/

            '
  test-windows-amd64:
    permissions:
      contents: read
    needs: build-windows-amd64
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Download Binary
        uses: actions/download-artifact@v8
        with:
          name: aaaaxy-debug-windows-amd64
      - name: Test
        run: 'bash scripts/github-action-benchmark.sh "Any% windows-amd64" benchmark.txt
          scripts/regression-test-demo.sh windows-amd64 "your time: 0:21:47.250; your
          speedrun categories: Any%;" "./aaaaxy.exe" assets/demos/_anypercent.dem'
      - name: Archive Results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: regression-test-results-anypercent-windows-amd64
          path: 'assets/demos/*.dem.*.log

            assets/demos/*.dem.*.png

            '
      - name: Store benchmark result
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule' }}
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Any% windows-amd64
          tool: customSmallerIsBetter
          output-file-path: benchmark.txt
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          auto-push: false
          alert-threshold: 105%
          alert-comment-cc-users: '@divVerent'
          max-items-in-chart: 90
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Diff Benchmark Commit
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule' }}
        run: |
          git show gh-pages > bench.patch
      - name: Upload Benchmark Results
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule' }}
        uses: actions/upload-artifact@v7
        with:
          name: bench-windows-amd64
          path: bench.patch
          if-no-files-found: error
  build-windows-386:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get -y install imagemagick libasound2-dev
          libgl-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev
          strip-nondeterminism
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Build
        run: make BUILDTYPE=fsrelease
        env:
          AAAAXY_BUILD_USE_VERSION_FILE: true
          GOARCH: 386
          GOOS: windows
          GOTOOLCHAIN: local
      - name: Archive Binary
        uses: actions/upload-artifact@v7
        with:
          name: aaaaxy-debug-windows-386
          path: 'aaaaxy.exe

            assets/generated/

            '
  test-windows-386:
    permissions:
      contents: read
    needs: build-windows-386
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Download Mesa
        run: curl -o mesa3d.7z -L https://github.com/pal1000/mesa-dist-win/releases/download/21.3.0/mesa3d-21.3.0-release-msvc.7z
      - name: Extract Mesa
        run: 7z e mesa3d.7z x86/\*.dll
      - name: Download Binary
        uses: actions/download-artifact@v8
        with:
          name: aaaaxy-debug-windows-386
      - name: Test
        run: 'bash scripts/github-action-benchmark.sh "Any% windows-386" benchmark.txt
          scripts/regression-test-demo.sh windows-386 "your time: 0:21:47.250; your
          speedrun categories: Any%;" "./aaaaxy.exe" assets/demos/_anypercent.dem'
      - name: Archive Results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: regression-test-results-anypercent-windows-386
          path: 'assets/demos/*.dem.*.log

            assets/demos/*.dem.*.png

            '
      - name: Store benchmark result
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule' }}
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Any% windows-386
          tool: customSmallerIsBetter
          output-file-path: benchmark.txt
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          auto-push: false
          alert-threshold: 120%
          alert-comment-cc-users: '@divVerent'
          max-items-in-chart: 90
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Diff Benchmark Commit
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule' }}
        run: |
          git show gh-pages > bench.patch
      - name: Upload Benchmark Results
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule' }}
        uses: actions/upload-artifact@v7
        with:
          name: bench-windows-386
          path: bench.patch
          if-no-files-found: error
  upload-results:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name
      == 'workflow_dispatch' && github.ref == 'refs/heads/main') || github.event_name
      == 'schedule' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs:
      - test-linux-amd64
      - test-windows-amd64
      - test-windows-386
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          ref: gh-pages
      - name: Clean Up
        run: |
          rm -f bench-*
      - name: Download Results
        uses: actions/download-artifact@v8
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Add Results
        run: |
          set -x
          for patch in bench-*/*.patch; do
            git apply --reject "$patch" || true
          done
      - name: Commit and Push
        run: |
          git commit -a -m"Update go-anypercent benchmark results for commit ${GITHUB_SHA}."
          git push
